<style>
    /* ... โค้ดเดิมของคุณทั้งหมด ... */

    /* เพิ่มแค่ส่วนนี้เพื่อให้ดูในมือถือได้ (จะไม่กระทบการแสดงผลในคอม) */
    @media (max-width: 768px) {
        body { flex-direction: column; height: auto; overflow-y: auto; }
        .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
        .main-content { height: auto; overflow: visible; padding: 10px; }
        .top-row { grid-template-columns: 1fr; min-height: auto; }
        .top-row .card { height: 350px; }
        div[style*="grid-template-columns: 1.2fr 1.8fr"] { grid-template-columns: 1fr !important; }
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    }
</style>

<script>
    /* ... โค้ดส่วนอื่นคงเดิม 100% ... */

    function initCharts() {
        const textColor = '#FFFFFF'; // กำหนดให้เป็นสีขาว
        const options = { 
            responsive: true, 
            maintainAspectRatio: false, 
            plugins: { 
                legend: { 
                    display: true, 
                    labels: { color: textColor, font: { size: 10 } } 
                } 
            } 
        };

        // 1. กราฟเรดาร์ (เพิ่มสีขาวรอบกราฟ)
        radarChart = new Chart(document.getElementById("radarChart"), { 
            type: 'radar', 
            data: { labels: [], datasets: [] }, 
            options: { 
                ...options, 
                scales: { 
                    r: { 
                        min: 0, max: 5, 
                        grid: { color: '#1e293b' },
                        pointLabels: { color: textColor, font: { size: 11 } },
                        ticks: { display: false } 
                    } 
                } 
            } 
        });

        // 2. กราฟแท่ง (เพิ่มสีขาวข้างกราฟ)
        barChart = new Chart(document.getElementById("barChart"), { 
            type: 'bar', 
            data: { labels: [], datasets: [] }, 
            options: { 
                ...options, 
                indexAxis: 'y', 
                scales: { 
                    x: { min: 0, max: 5, grid: { color: '#1e293b' }, ticks: { color: textColor } },
                    y: { ticks: { color: textColor } } 
                } 
            } 
        });

        // 3. กราฟ Butterfly
        butterflyChart = new Chart(document.getElementById("butterflyChart"), { 
            type: 'bar', 
            data: { labels: [], datasets: [] }, 
            options: { 
                ...options, 
                indexAxis: 'y', 
                scales: { 
                    x: { stacked: true, grid: { display: false }, ticks: { color: textColor } }, 
                    y: { stacked: true, position: 'center', ticks: { color: textColor } } 
                } 
            } 
        });
    }
</script>
