<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Analytics - Pro Skills Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #020617; --bg-card: #0f172a; --accent-blue: #38bdf8;
            --accent-green: #4ade80; --accent-rose: #fb7185; --accent-warn: #fbbf24;
            --text-primary: #f8fafc; --text-secondary: #94a3b8; --border: #1e293b;
        }
        * { box-sizing: border-box; font-family: 'Inter', 'Sarabun', sans-serif; }
        
        body { margin: 0; background-color: var(--bg-body); color: var(--text-primary); display: flex; height: 100vh; overflow: hidden; }

        /* --- Responsive Sidebar --- */
        .sidebar { width: 320px; background: #020617; border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; flex-shrink: 0; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .main-content { padding: 10px; }
            .top-row { grid-template-columns: 1fr !important; }
            div[style*="grid-template-columns: 1.2fr 1.8fr"] { grid-template-columns: 1fr !important; }
        }

        .lang-bar { display: flex; gap: 5px; margin-bottom: 10px; }
        .lang-btn { background: var(--bg-card); border: 1px solid var(--border); color: white; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .lang-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); }
        .emp-list-container { flex: 1; overflow-y: auto; margin: 15px 0; padding-right: 5px; }
        .emp-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 8px; cursor: pointer; position: relative; }
        .emp-item.active { border-color: var(--accent-blue); background: rgba(56, 189, 248, 0.1); }
        .edit-mode-box { background: #1e293b; padding: 10px; border-radius: 8px; margin-top: 8px; display: none; }
        .edit-mode-box input { width: 100%; background: #020617; border: 1px solid var(--border); color: white; padding: 5px; margin: 3px 0; border-radius: 4px; }
        
        .top-row { display: grid; grid-template-columns: 1fr 1.5fr 1.5fr; gap: 15px; }
        .card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 15px; position: relative; }
        .profile-circle { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--accent-blue); overflow: hidden; margin: 0 auto 5px; background: #000; display: flex; align-items: center; justify-content: center; }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
        
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); font-size: 12px; color: white; }
        .input-num { width: 60px; background: #020617; border: 1px solid var(--border); color: white; padding: 4px; border-radius: 5px; text-align: center; }
        .btn { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-add { background: rgba(56, 189, 248, 0.1); color: var(--accent-blue); border: 1px dashed var(--accent-blue); width: 100%; margin-bottom: 10px; }
        .btn-save { background: var(--accent-green); color: #020617; width: 100%; }
        h4 { color: white !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="lang-bar">
        <button class="lang-btn active" onclick="setLang('th')">TH</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <div id="side-title" style="font-size: 1.2rem; font-weight: 800; color: var(--accent-blue); margin-bottom: 15px;">PQC ADMIN</div>
    <button class="btn btn-add" onclick="addEmployee()">+ เพิ่มพนักงาน</button>
    <div class="emp-list-container" id="empList"></div>
    <button class="btn btn-save" onclick="saveData()">💾 บันทึกข้อมูล</button>
</div>

<div class="main-content">
    <div class="top-row">
        <div class="card" style="text-align: center;">
            <div id="profileDisplays" style="display:flex; justify-content:center; gap:10px; flex-wrap: wrap;"></div>
            <h4 id="lbl-compare">เปรียบเทียบพนักงาน</h4>
        </div>
        <div class="card"><canvas id="radarChart"></canvas></div>
        <div class="card"><canvas id="barChart"></canvas></div>
    </div>

    <div style="display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 15px;">
        <div class="card">
            <h4 id="lbl-discipline">⚖️ Discipline</h4>
            <div style="height: 180px;"><canvas id="butterflyChart"></canvas></div>
        </div>
        <div class="card">
            <h4 id="lbl-skillMatrix">📊 Skill Table</h4>
            <div class="table-container" id="tableArea"></div>
        </div>
    </div>
</div>

<script>
/* --- (Script ส่วน Logic คงเดิมตามที่คุณให้มา โดยปรับสี Chart เป็นสีขาว) --- */
let currentLang = 'th';
const skillKeys = ["Basic Knowledge", "Inspection Skill", "Documentation & System", "Quality Analysis", "Process Control", "Communication", "Advanced Skill"];
const attKeys = ["Absent", "Personal Leave", "Sick Leave", "Vacation", "Late"];
let empData = {}; // เริ่มจากว่างหรือโหลดจาก LocalStorage
let selected = [];
let radarChart, barChart, butterflyChart;

const translations = {
    th: { skills: ["ความรู้พื้นฐาน", "ทักษะการตรวจ", "เอกสาร/ระบบ", "การวิเคราะห์", "คุมกระบวนการ", "สื่อสาร", "ขั้นสูง"], attLabels: ["ขาดงาน", "ลากิจ", "ลาป่วย", "พักร้อน", "มาสาย"] },
    en: { skills: skillKeys, attLabels: attKeys }
};

function init() {
    const saved = localStorage.getItem('hr_pro_portfolio_v7');
    if(saved) empData = JSON.parse(saved);
    initCharts();
    renderList();
}

function initCharts() {
    const textColor = '#FFFFFF';
    const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: textColor } } } };
    
    radarChart = new Chart(document.getElementById("radarChart"), { 
        type: 'radar', 
        data: { labels: translations[currentLang].skills, datasets: [] }, 
        options: { ...opt, scales: { r: { grid: { color: '#1e293b' }, pointLabels: { color: textColor }, ticks: { display: false } } } } 
    });

    barChart = new Chart(document.getElementById("barChart"), { 
        type: 'bar', 
        data: { labels: translations[currentLang].skills, datasets: [] }, 
        options: { ...opt, indexAxis: 'y', scales: { x: { ticks: { color: textColor } }, y: { ticks: { color: textColor } } } } 
    });

    butterflyChart = new Chart(document.getElementById("butterflyChart"), { 
        type: 'bar', 
        data: { labels: translations[currentLang].attLabels, datasets: [] }, 
        options: { ...opt, indexAxis: 'y', scales: { x: { stacked: true }, y: { stacked: true, ticks: { color: textColor } } } } 
    });
}

function renderList() {
    const list = document.getElementById("empList");
    list.innerHTML = Object.keys(empData).map(name => `
        <div class="emp-item ${selected.includes(name) ? 'active' : ''}" onclick="toggleSelect('${name}')">
            <b>${name}</b><br><small>${empData[name].level} | ${empData[name].dept}</small>
        </div>
    `).join('');
}

function toggleSelect(name) {
    if(selected.includes(name)) selected = selected.filter(x => x !== name);
    else if(selected.length < 2) selected.push(name);
    renderList(); updateUI();
}

function updateUI() {
    const t = translations[currentLang];
    const ds = selected.map((n, i) => ({
        label: n, data: skillKeys.map(s => empData[n].skills[s] || 0),
        borderColor: i === 0 ? '#38bdf8' : '#fb7185', backgroundColor: i === 0 ? 'rgba(56, 189, 248, 0.2)' : 'rgba(251, 113, 133, 0.2)'
    }));
    radarChart.data.datasets = ds; radarChart.update();
    barChart.data.datasets = ds; barChart.update();
    
    renderTable();
}

function renderTable() {
    const area = document.getElementById("tableArea");
    if(!selected.length) return area.innerHTML = "";
    let html = `<table><tr><th>Skill</th>` + selected.map(n => `<th>${n}</th>`).join('') + `</tr>`;
    skillKeys.forEach((s, idx) => {
        html += `<tr><td>${translations[currentLang].skills[idx]}</td>` + 
        selected.map(n => `<td><input type="number" class="input-num" value="${empData[n].skills[s]||0}" onchange="empData['${n}'].skills['${s}']=parseFloat(this.value); saveData(); updateUI();"></td>`).join('') + `</tr>`;
    });
    area.innerHTML = html + `</table>`;
}

function addEmployee() {
    const name = prompt("ชื่อพนักงาน:");
    if(name) {
        empData[name] = { level: "-", dept: "-", skills: {}, att: {}, init: name.charAt(0) };
        renderList();
    }
}

function saveData() { localStorage.setItem('hr_pro_portfolio_v7', JSON.stringify(empData)); }

window.onload = init;
</script>
</body>
</html>
