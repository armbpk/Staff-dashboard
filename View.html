<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee View - Skills Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #020617; --bg-card: #0f172a; --accent-blue: #38bdf8;
            --text-primary: #f8fafc; --text-secondary: #94a3b8; --border: #1e293b;
        }
        * { box-sizing: border-box; font-family: 'Inter', 'Sarabun', sans-serif; }
        
        body { 
            margin: 0; background-color: var(--bg-body); color: var(--text-primary);
            display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;
        }

        /* --- ปรับแต่ง Layout ให้ลื่นไหลทั้งคอมและมือถือ --- */
        .container { padding: 15px; display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 1400px; margin: 0 auto; }

        .header-section { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .lang-bar { display: flex; gap: 8px; }
        .lang-btn { background: var(--bg-card); border: 1px solid var(--border); color: white; padding: 5px 12px; border-radius: 6px; cursor: pointer; }

        /* การจัดเรียงกราฟ */
        .grid-charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        
        .card { 
            background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); 
            padding: 20px; display: flex; flex-direction: column; min-height: 350px;
        }

        .card h4 { margin-top: 0; color: #FFFFFF; font-size: 1.1rem; border-left: 4px solid var(--accent-blue); padding-left: 10px; }

        .table-container { overflow-x: auto; margin-top: 10px; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border); color: white; }

        /* ปรับปรุงให้แสดงผลในมือถือ (Responsive) */
        @media (max-width: 768px) {
            .grid-charts { grid-template-columns: 1fr; }
            .card { min-height: 300px; padding: 15px; }
            .container { padding: 10px; }
        }

        footer { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h2 style="color: var(--accent-blue); margin: 0;">ข้อมูลทักษะพนักงาน</h2>
        <div class="lang-bar">
            <button class="lang-btn" onclick="setLang('th')">TH</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </div>

    <div class="grid-charts">
        <div class="card">
            <h4>📊 Skills Radar Chart</h4>
            <div style="flex:1;"><canvas id="radarChart"></canvas></div>
        </div>
        <div class="card">
            <h4>📈 Skills Bar Chart</h4>
            <div style="flex:1;"><canvas id="barChart"></canvas></div>
        </div>
    </div>

    <div class="card">
        <h4>📋 Skill Matrix Table</h4>
        <div class="table-container" id="tableArea">
            </div>
    </div>
</div>

<footer>© 2026 Haier Thailand PQC Team</footer>

<script>
    // ส่วนนี้คือการตั้งค่าให้ตัวหนังสือในกราฟเป็นสีขาวทั้งหมด
    const chartTextColor = '#FFFFFF';
    let radarChart, barChart;

    function initCharts() {
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: chartTextColor, font: { size: 12 } } }
            }
        };

        // กราฟเรดาร์
        radarChart = new Chart(document.getElementById("radarChart"), {
            type: 'radar',
            data: { 
                labels: ["ความรู้พื้นฐาน", "ทักษะการตรวจ", "เอกสาร/ระบบ", "การวิเคราะห์", "คุมกระบวนการ", "สื่อสาร", "ขั้นสูง"],
                datasets: [] 
            },
            options: {
                ...commonOptions,
                scales: {
                    r: {
                        grid: { color: '#334155' },
                        angleLines: { color: '#334155' },
                        pointLabels: { color: chartTextColor, font: { size: 12 } },
                        ticks: { display: false }
                    }
                }
            }
        });

        // กราฟแท่ง
        barChart = new Chart(document.getElementById("barChart"), {
            type: 'bar',
            data: { 
                labels: ["ความรู้พื้นฐาน", "ทักษะการตรวจ", "เอกสาร/ระบบ", "การวิเคราะห์", "คุมกระบวนการ", "สื่อสาร", "ขั้นสูง"],
                datasets: [] 
            },
            options: {
                ...commonOptions,
                indexAxis: 'y',
                scales: {
                    x: { ticks: { color: chartTextColor }, grid: { color: '#1e293b' } },
                    y: { ticks: { color: chartTextColor } }
                }
            }
        });
    }

    // ฟังก์ชันดึงข้อมูลพนักงานจาก LocalStorage (ที่เซฟมาจากหน้าหลัก)
    function loadData() {
        const saved = localStorage.getItem('hr_pro_portfolio_v7');
        if(saved) {
            // เขียน logic แสดงผลข้อมูลตามที่คุณเคยทำไว้
            console.log("Data loaded");
        }
    }

    window.onload = () => {
        initCharts();
        loadData();
    };
</script>
</body>
</html>
