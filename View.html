<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee View - Skills Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #020617; --bg-card: #0f172a; --accent-blue: #38bdf8;
            --accent-green: #4ade80; --accent-rose: #fb7185; --accent-warn: #fbbf24;
            --text-primary: #f8fafc; --text-secondary: #94a3b8; --border: #1e293b;
        }
        * { box-sizing: border-box; font-family: 'Inter', 'Sarabun', sans-serif; }
        
        body { 
            margin: 0; background-color: var(--bg-body); color: var(--text-primary);
            display: flex; height: 100vh; overflow: hidden; 
        }

        .sidebar { width: 320px; border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; flex-shrink: 0; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .top-row { display: grid; grid-template-columns: 1fr 1.5fr 1.5fr; gap: 15px; min-height: 320px; }
        
        .card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 15px; position: relative; }
        .card h4 { color: #FFFFFF !important; margin-top: 0; }

        .emp-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 8px; cursor: pointer; }
        .emp-item.active { border-color: var(--accent-blue); background: rgba(56, 189, 248, 0.1); }

        .table-container { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 12px; color: white; text-align: center; }

        /* --- ส่วนแก้ให้ดูในมือถือได้ --- */
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .main-content { height: auto; overflow: visible; padding: 10px; }
            .top-row { grid-template-columns: 1fr; min-height: auto; }
            .top-row .card { height: 350px; }
            div[style*="grid-template-columns: 1.2fr 1.8fr"] { grid-template-columns: 1fr !important; }
            .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="font-size: 1.2rem; font-weight: 800; color: #FFFFFF; margin-bottom: 15px;">PQC SKILLS VIEW</div>
    <div id="empList"></div>
</div>

<div class="main-content">
    <div class="top-row">
        <div class="card">
            <h4 style="text-align: center;">เปรียบเทียบพนักงาน</h4>
            <div id="profileDisplays" style="display:flex; justify-content:center; gap:10px; flex-wrap: wrap;"></div>
        </div>
        <div class="card"><canvas id="radarChart"></canvas></div>
        <div class="card"><canvas id="barChart"></canvas></div>
    </div>

    <div class="card">
        <h4>📊 Skill Matrix</h4>
        <div class="table-container" id="tableArea"></div>
    </div>
</div>

<script>
    // ส่วน Logic เดิมทั้งหมดของคุณ
    let empData = {};
    let selected = [];
    const skillKeys = ["ความรู้พื้นฐาน", "ทักษะการตรวจ", "เอกสาร/ระบบ", "การวิเคราะห์", "คุมกระบวนการ", "สื่อสาร", "ขั้นสูง"];
    const chartColors = ['#38bdf8', '#fb7185', '#a855f7'];

    let radarChart, barChart;

    function initCharts() {
        const textColor = '#FFFFFF';
        const options = { 
            responsive: true, maintainAspectRatio: false, 
            plugins: { legend: { labels: { color: textColor } } } 
        };

        radarChart = new Chart(document.getElementById("radarChart"), {
            type: 'radar',
            data: { labels: skillKeys, datasets: [] },
            options: {
                ...options,
                scales: { r: { grid: { color: '#1e293b' }, pointLabels: { color: textColor }, ticks: { display: false } } }
            }
        });

        barChart = new Chart(document.getElementById("barChart"), {
            type: 'bar',
            data: { labels: skillKeys, datasets: [] },
            options: {
                ...options, indexAxis: 'y',
                scales: { x: { ticks: { color: textColor } }, y: { ticks: { color: textColor } } }
            }
        });
    }

    function renderList() {
        const list = document.getElementById("empList");
        list.innerHTML = Object.keys(empData).map(name => `
            <div class="emp-item ${selected.includes(name) ? 'active' : ''}" onclick="toggleSelect('${name}')">
                <b>${name}</b><br><small>${empData[name].level || ''}</small>
            </div>
        `).join('');
    }

    function toggleSelect(name) {
        if(selected.includes(name)) selected = selected.filter(x => x !== name);
        else if(selected.length < 3) selected.push(name);
        renderList();
        update();
    }

    function update() {
        // อัปเดตกราฟ
        radarChart.data.datasets = selected.map((n, i) => ({
            label: n, data: skillKeys.map(s => empData[n].skills[s] || 0), borderColor: chartColors[i]
        }));
        radarChart.update();

        barChart.data.datasets = selected.map((n, i) => ({
            label: n, data: skillKeys.map(s => empData[n].skills[s] || 0), backgroundColor: chartColors[i]
        }));
        barChart.update();

        // อัปเดตตาราง
        renderTable();
    }

    function renderTable() {
        const area = document.getElementById("tableArea");
        if(selected.length === 0) { area.innerHTML = ""; return; }
        let html = `<table><thead><tr><th>Skill</th>` + selected.map(n => `<th>${n}</th>`).join('') + `</tr></thead><tbody>`;
        skillKeys.forEach(s => {
            html += `<tr><td>${s}</td>` + selected.map(n => `<td>${empData[n].skills[s] || 0}</td>`).join('') + `</tr>`;
        });
        area.innerHTML = html + `</tbody></table>`;
    }

    function loadData() {
        const saved = localStorage.getItem('hr_pro_portfolio_v7');
        if(saved) {
            empData = JSON.parse(saved);
            renderList();
        }
    }

    window.onload = () => {
        initCharts();
        loadData();
    };
</script>
</body>
</html>
