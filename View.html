<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee View - Skills Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- คงสไตล์เดิมของคุณไว้ทั้งหมด --- */
        :root {
            --bg-body: #020617; --bg-card: #0f172a; --accent-blue: #38bdf8;
            --accent-green: #4ade80; --accent-rose: #fb7185; --accent-warn: #fbbf24;
            --text-primary: #f8fafc; --text-secondary: #94a3b8; --border: #1e293b;
        }
        * { box-sizing: border-box; font-family: 'Inter', 'Sarabun', sans-serif; }
        
        body { 
            margin: 0; background-color: var(--bg-body); color: var(--text-primary);
            display: flex; height: 100vh; overflow: hidden; 
        }

        .sidebar { width: 320px; border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; flex-shrink: 0; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .top-row { display: grid; grid-template-columns: 1fr 1.5fr 1.5fr; gap: 15px; min-height: 320px; }
        .card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 15px; position: relative; }
        .table-container { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 12px; color: white; }

        /* --- ส่วนที่เพิ่มเพื่อให้ดูในมือถือได้ (จะไม่กระทบการแสดงผลในคอม) --- */
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .main-content { height: auto; overflow: visible; padding: 10px; }
            .top-row { grid-template-columns: 1fr; min-height: auto; }
            .top-row .card { height: 350px; }
            /* ปรับ Grid ส่วนล่างให้เรียงเป็นแนวตั้ง */
            div[style*="grid-template-columns: 1.2fr 1.8fr"], 
            div[style*="grid-template-columns: 1fr 1fr"] { 
                grid-template-columns: 1fr !important; 
            }
            .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div id="side-title" style="font-size: 1.2rem; font-weight: 800; color: #FFFFFF; margin-bottom: 15px;">PQC SKILLS VIEW</div>
    <div id="empList"></div>
</div>

<div class="main-content">
    <div class="top-row">
        <div class="card" id="profileCard">
            <h4 style="color: white; text-align: center;">ข้อมูลพนักงาน</h4>
            <div id="profileDisplays"></div>
        </div>
        <div class="card"><canvas id="radarChart"></canvas></div>
        <div class="card"><canvas id="barChart"></canvas></div>
    </div>

    <div class="card">
        <h4 style="color: white;">เปรียบเทียบวินัย</h4>
        <div style="height: 200px;"><canvas id="butterflyChart"></canvas></div>
    </div>

    <div class="card">
        <h4 style="color: white;">ตารางทักษะ</h4>
        <div class="table-container" id="tableArea"></div>
    </div>
</div>

<script>
    /* --- โค้ดส่วนดึงข้อมูลเดิมของคุณ --- */
    let empData = {};
    const skillKeys = ["Basic Knowledge", "Inspection Skill", "Documentation & System", "Quality Analysis", "Process Control", "Communication", "Advanced Skill"];

    function initCharts() {
        const textColor = '#FFFFFF'; // กำหนดตัวอักษรในกราฟเป็นสีขาว
        const options = { 
            responsive: true, 
            maintainAspectRatio: false, 
            plugins: { 
                legend: { 
                    display: true, 
                    labels: { color: textColor, font: { size: 10 } } 
                } 
            } 
        };

        // 1. กราฟเรดาร์
        radarChart = new Chart(document.getElementById("radarChart"), { 
            type: 'radar', 
            data: { labels: skillKeys, datasets: [] }, 
            options: { 
                ...options, 
                scales: { 
                    r: { 
                        min: 0, max: 5, 
                        grid: { color: '#1e293b' },
                        pointLabels: { color: textColor, font: { size: 11 } },
                        ticks: { display: false } 
                    } 
                } 
            } 
        });

        // 2. กราฟแท่ง
        barChart = new Chart(document.getElementById("barChart"), { 
            type: 'bar', 
            data: { labels: skillKeys, datasets: [] }, 
            options: { 
                ...options, 
                indexAxis: 'y', 
                scales: { 
                    x: { min: 0, max: 5, grid: { color: '#1e293b' }, ticks: { color: textColor } },
                    y: { ticks: { color: textColor } } 
                } 
            } 
        });

        // 3. กราฟ Butterfly
        butterflyChart = new Chart(document.getElementById("butterflyChart"), { 
            type: 'bar', 
            data: { labels: ["Absent", "Leave", "Sick", "Late"], datasets: [] }, 
            options: { 
                ...options, 
                indexAxis: 'y', 
                scales: { 
                    x: { stacked: true, grid: { display: false }, ticks: { color: textColor } }, 
                    y: { stacked: true, position: 'center', ticks: { color: textColor } } 
                } 
            } 
        });
    }

    // ฟังก์ชัน loadData ดึงข้อมูลจาก localStorage (ชื่อ key ต้องตรงกับหน้าแก้ไข)
    function loadData() {
        const saved = localStorage.getItem('hr_pro_portfolio_v7');
        if(saved) {
            empData = JSON.parse(saved);
            // เรียกฟังก์ชันแสดงผลของคุณที่นี่ (เช่น renderList, update)
        }
    }

    window.onload = () => {
        initCharts();
        loadData();
    };
</script>
</body>
</html>
