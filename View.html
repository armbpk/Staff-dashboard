<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PQC Analytics - Skills Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #020617; --bg-card: #0f172a; --accent-blue: #38bdf8;
            --accent-green: #4ade80; --accent-rose: #fb7185; --accent-warn: #fbbf24;
            --accent-purple: #a855f7;
            --text-primary: #f8fafc; --text-secondary: #94a3b8; --border: #1e293b;
        }
        * { box-sizing: border-box; font-family: 'Inter', 'Sarabun', sans-serif; }
        
        body { 
            margin: 0; background-color: var(--bg-body); color: var(--text-primary); 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* Responsive: ปรับเป็นแนวตั้งบนมือถือ */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100% !important; height: 400px !important; border-right: none !important; border-bottom: 2px solid var(--border); }
            .main-content { padding: 10px; }
            .top-row, .grid-2col { grid-template-columns: 1fr !important; }
            canvas { max-height: 250px !important; }
        }

        .sidebar { 
            width: 320px; background: #020617; border-right: 1px solid var(--border); 
            padding: 15px; display: flex; flex-direction: column; flex-shrink: 0; 
        }

        .main-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

        .lang-bar { display: flex; gap: 5px; margin-bottom: 10px; }
        .lang-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .lang-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); }
        
        .emp-list-container { flex: 1; overflow-y: auto; margin: 10px 0; padding-right: 5px; border: 1px solid var(--border); border-radius: 8px; padding: 5px; }
        .emp-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; position: relative; }
        .emp-item.active { border-color: var(--accent-blue); background: rgba(56, 189, 248, 0.1); }
        
        .top-row { display: grid; grid-template-columns: 1fr 1.5fr 1.5fr; gap: 15px; }
        .grid-2col { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 15px; }
        .card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 15px; }

        .profile-circle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--accent-blue); overflow: hidden; margin: 0 auto 5px; background: #000; display: flex; align-items: center; justify-content: center; }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
        
        .table-container { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 300px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); font-size: 11px; }
        
        .input-num { width: 45px; background: #020617; border: 1px solid var(--border); color: white; padding: 4px; border-radius: 5px; text-align: center; }
        .btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-add { background: rgba(56, 189, 248, 0.1); color: var(--accent-blue); border: 1px dashed var(--accent-blue); margin-bottom: 10px; }
        .btn-save { background: var(--accent-green); color: #020617; margin-top: auto; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="lang-bar">
        <button class="lang-btn active" onclick="setLang('th')">TH</button>
        <button class="lang-btn" onclick="setLang('cn')">CN</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <div style="font-size: 1.2rem; font-weight: 800; color: #fff; margin-bottom: 15px;">PQC SKILLS VIEW</div>
    <button class="btn btn-add" onclick="addEmployee()">+ เพิ่มพนักงาน</button>
    <div class="emp-list-container" id="empList"></div>
    <button class="btn btn-save" onclick="saveData()">💾 บันทึกข้อมูล</button>
</div>

<div class="main-content">
    <div class="top-row">
        <div class="card" style="text-align: center;">
            <div id="profileDisplays" style="display:flex; justify-content:center; gap:10px; flex-wrap: wrap;"></div>
            <h4 id="lbl-compare">เปรียบเทียบพนักงาน</h4>
        </div>
        <div class="card"><canvas id="radarChart"></canvas></div>
        <div class="card"><canvas id="barChart"></canvas></div>
    </div>

    <div class="grid-2col">
        <div class="card">
            <h4 id="lbl-topSkill" style="color: var(--accent-rose);">🏆 Top Skills</h4>
            <div id="rankSkillArea"></div>
            <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
            <h4 id="lbl-discipline" style="color: var(--accent-warn);">⚖️ Discipline</h4>
            <div style="height: 180px;"><canvas id="butterflyChart"></canvas></div>
        </div>
        <div class="card">
            <h4 id="lbl-skillMatrix" style="color: var(--accent-green);">📊 Skill Matrix</h4>
            <div class="table-container" id="tableArea"></div>
        </div>
    </div>

    <div class="card">
        <h4 id="lbl-attMatrix" style="color: var(--accent-blue);">📅 Attendance Matrix</h4>
        <div class="table-container" id="attTableArea"></div>
    </div>
</div>

<script>
let currentLang = 'th';
const skillKeys = ["Basic Knowledge", "Inspection Skill", "Documentation & System", "Quality Analysis", "Process Control", "Communication", "Advanced Skill"];
const attKeys = ["Absent", "Personal Leave", "Sick Leave", "Vacation", "Late"];
const chartColors = ['#38bdf8', '#fb7185', '#a855f7'];
const chartFills = ['rgba(56, 189, 248, 0.2)', 'rgba(251, 113, 133, 0.2)', 'rgba(168, 85, 247, 0.2)'];

const translations = {
    th: { compare: "เปรียบเทียบพนักงาน", topSkill: "🏆 อันดับทักษะ", discipline: "⚖️ เปรียบเทียบวินัย", skillMatrix: "📊 ตารางทักษะ", attMatrix: "📅 ตารางการลงเวลา", skills: ["ความรู้พื้นฐาน", "ทักษะการตรวจ", "เอกสาร/ระบบ", "การวิเคราะห์", "คุมกระบวนการ", "สื่อสาร", "ขั้นสูง"], attLabels: ["ขาดงาน", "ลากิจ", "ลาป่วย", "พักร้อน", "มาสาย"] },
    cn: { compare: "员工对比", topSkill: "🏆 技能排名", discipline: "⚖️ 纪律对比", skillMatrix: "📊 技能矩陣", attMatrix: "📅 考勤矩陣", skills: ["基础知识", "检查技能", "文件/系统", "质量分析", "过程控制", "沟通", "高级技能"], attLabels: ["缺勤", "事假", "病假", "年假", "迟到"] },
    en: { compare: "Comparison Profile", topSkill: "🏆 Top Skills", discipline: "⚖️ Discipline Comparison", skillMatrix: "📊 Skill Matrix", attMatrix: "📅 Attendance Matrix", skills: skillKeys, attLabels: ["Absent", "Personal", "Sick", "Vacation", "Late"] }
};

// ดึงข้อมูลเดิมจากพรอมต์แรกของคุณ
let defaultData = {
    "Naratip K.": { level: "S3", dept: "配管+大管路+氦检", init: "NK", skills: {"Basic Knowledge":5, "Inspection Skill":5, "Documentation & System":4, "Quality Analysis":4, "Process Control":4, "Communication":4, "Advanced Skill":5}, att: {Absent:0, "Personal Leave":0, "Sick Leave":0, Vacation:0, Late:0} },
    "Navamin C.": { level: "S3", dept: "钣金+注塑", init: "NC", skills: {"Basic Knowledge":3, "Inspection Skill":4, "Documentation & System":3, "Quality Analysis":4, "Process Control":4, "Communication":4, "Advanced Skill":5}, att: {Absent:0, "Personal Leave":0, "Sick Leave":0, Vacation:0, Late:0} },
    "Benjaporn S.": { level: "S3", dept: "预装+喷粉+电控+附件", init: "BS", skills: {"Basic Knowledge":5, "Inspection Skill":5, "Documentation & System":4, "Quality Analysis":4, "Process Control":5, "Communication":4, "Advanced Skill":5}, att: {Absent:0, "Personal Leave":0, "Sick Leave":0, Vacation:0, Late:0} },
    "Panisara N.": { level: "S3", dept: "SMT", init: "PN", skills: {"Basic Knowledge":5, "Inspection Skill":4, "Documentation & System":2, "Quality Analysis":4, "Process Control":4, "Communication":3, "Advanced Skill":2}, att: {Absent:0, "Personal Leave":0, "Sick Leave":0, Vacation:0, Late:0} },
    "Aiwarin P.": { level: "S2", dept: "两器", init: "AP", skills: {"Basic Knowledge":5, "Inspection Skill":4, "Documentation & System":0, "Quality Analysis":4, "Process Control":4, "Communication":3, "Advanced Skill":1}, att: {Absent:0, "Personal Leave":0, "Sick Leave":0, Vacation:0, Late:0} },
    "Thanyarat C.": { level: "S2", dept: "两器", init: "TC", skills: {"Basic Knowledge":5, "Inspection Skill":3, "Documentation & System":0, "Quality Analysis":4, "Process Control":4, "Communication":3, "Advanced Skill":1}, att: {Absent:0, "Personal Leave":0, "Sick Leave":0, Vacation:0, Late:0} },
    "Saisamorn J.": { level: "S2", dept: "钣金+注塑", init: "SJ", skills: {"Basic Knowledge":5, "Inspection Skill":5, "Documentation & System":0, "Quality Analysis":4, "Process Control":4, "Communication":3, "Advanced Skill":1}, att: {Absent:0, "Personal Leave":0, "Sick Leave":0, Vacation:0, Late:0} },
    "Saengravee M.": { level: "S2", dept: "钣金+注塑", init: "SM", skills: {"Basic Knowledge":5, "Inspection Skill":5, "Documentation & System":0, "Quality Analysis":4, "Process Control":4, "Communication":3, "Advanced Skill":1}, att: {Absent:0, "Personal Leave":0, "Sick Leave":0, Vacation:0, Late:0} },
    "Pornthip P.": { level: "S2", dept: "氦检", init: "PP", skills: {"Basic Knowledge":5, "Inspection Skill":5, "Documentation & System":0, "Quality Analysis":3, "Process Control":4, "Communication":3, "Advanced Skill":0}, att: {Absent:0, "Personal Leave":0, "Sick Leave":0, Vacation:0, Late:0} },
    "Chavannut N.": { level: "S2", dept: "氦检", init: "CN", skills: {"Basic Knowledge":5, "Inspection Skill":4, "Documentation & System":0, "Quality Analysis":3, "Process Control":4, "Communication":3, "Advanced Skill":0}, att: {Absent:0, "Personal Leave":0, "Sick Leave":0, Vacation:0, Late:0} }
};

let empData = {};
let selected = [];
let radarChart, barChart, butterflyChart;

function init() {
    const saved = localStorage.getItem('hr_pro_portfolio_v7');
    empData = saved ? JSON.parse(saved) : defaultData;
    initCharts();
    renderList();
    update();
}

function initCharts() {
    const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 } } } } };
    radarChart = new Chart(document.getElementById("radarChart"), { type: 'radar', data: { labels: [], datasets: [] }, options: { ...opt, scales: { r: { min: 0, max: 5, grid: { color: '#1e293b' }, ticks: { display: false } } } } });
    barChart = new Chart(document.getElementById("barChart"), { type: 'bar', data: { labels: [], datasets: [] }, options: { ...opt, indexAxis: 'y', scales: { x: { min: 0, max: 5, grid: { color: '#1e293b' } } } } });
    butterflyChart = new Chart(document.getElementById("butterflyChart"), { type: 'bar', data: { labels: [], datasets: [] }, options: { ...opt, indexAxis: 'y', scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true } } } });
}

function toggleSelect(name) {
    if(selected.includes(name)) selected = selected.filter(x => x !== name);
    else if(selected.length < 3) selected.push(name);
    renderList(); update();
}

function update() {
    const t = translations[currentLang];
    document.getElementById("lbl-compare").innerText = t.compare;
    document.getElementById("lbl-topSkill").innerText = t.topSkill;
    document.getElementById("lbl-discipline").innerText = t.discipline;
    document.getElementById("lbl-skillMatrix").innerText = t.skillMatrix;
    document.getElementById("lbl-attMatrix").innerText = t.attMatrix;

    const displays = document.getElementById("profileDisplays");
    displays.innerHTML = selected.map((n, i) => `
        <div style="text-align:center;">
            <div class="profile-circle" style="border-color:${chartColors[i]}">${empData[n].img ? `<img src="${empData[n].img}">` : `<b>${empData[n].init}</b>`}</div>
            <div style="font-size:11px; font-weight:bold; color:${chartColors[i]}">${n}</div>
        </div>`).join('') || '<p style="color:var(--text-secondary); font-size:12px;">เลือกพนักงาน (สูงสุด 3 คน)</p>';

    // Update Radar & Bar
    const dsets = selected.map((n, i) => ({
        label: n, data: skillKeys.map(s => empData[n].skills[s] || 0),
        borderColor: chartColors[i], backgroundColor: chartFills[i], borderWidth: 2
    }));
    radarChart.data.labels = t.skills; radarChart.data.datasets = dsets; radarChart.update();
    barChart.data.labels = t.skills; barChart.data.datasets = dsets; barChart.update();

    // Update Butterfly
    butterflyChart.data.labels = t.attLabels;
    butterflyChart.data.datasets = selected.map((n, i) => ({
        label: n, data: attKeys.map(a => i === 0 ? -(empData[n].att[a]||0) : (empData[n].att[a]||0)),
        backgroundColor: chartColors[i]
    }));
    butterflyChart.update();

    renderTable(); renderAttTable(); renderRankings();
}

function renderTable() {
    const t = translations[currentLang];
    const area = document.getElementById("tableArea");
    if(!selected.length) { area.innerHTML = "เลือกพนักงาน..."; return; }
    let html = `<table><thead><tr><th>Skill</th>` + selected.map((n, i) => `<th style="color:${chartColors[i]}">${n}</th>`).join('') + `</tr></thead><tbody>`;
    skillKeys.forEach((s, idx) => {
        html += `<tr><td style="text-align:left">${t.skills[idx]}</td>` + selected.map(n => `<td><input type="number" class="input-num" value="${empData[n].skills[s]||0}" onchange="empData['${n}'].skills['${s}']=parseFloat(this.value); update()"></td>`).join('') + `</tr>`;
    });
    area.innerHTML = html + `</tbody></table>`;
}

function renderAttTable() {
    const t = translations[currentLang];
    const area = document.getElementById("attTableArea");
    if(!selected.length) return area.innerHTML = "";
    let html = `<table><thead><tr><th>Metric</th>` + selected.map((n, i) => `<th style="color:${chartColors[i]}">${n}</th>`).join('') + `</tr></thead><tbody>`;
    attKeys.forEach((a, idx) => {
        html += `<tr><td style="text-align:left">${t.attLabels[idx]}</td>` + selected.map(n => `<td><input type="number" class="input-num" value="${empData[n].att[a]||0}" onchange="empData['${n}'].att['${a}']=parseFloat(this.value); update()"></td>`).join('') + `</tr>`;
    });
    area.innerHTML = html + `</tbody></table>`;
}

function renderRankings() {
    const all = Object.keys(empData).map(n => ({ name: n, avg: (skillKeys.reduce((a, s) => a + (empData[n].skills[s] || 0), 0) / skillKeys.length).toFixed(2) })).sort((a,b) => b.avg - a.avg);
    document.getElementById("rankSkillArea").innerHTML = all.slice(0, 5).map((r, i) => `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #1e293b; font-size:12px;"><span>#${i+1} ${r.name}</span> <b style="color:var(--accent-green)">${r.avg}</b></div>`).join('');
}

function renderList() {
    const list = document.getElementById("empList");
    list.innerHTML = Object.keys(empData).map(name => {
        const isSel = selected.includes(name);
        return `<div class="emp-item ${isSel ? 'active' : ''}" onclick="toggleSelect('${name}')">
            <b>${name}</b><br><small>${empData[name].level} | ${empData[name].dept}</small>
        </div>`;
    }).join('');
}

function saveData() { localStorage.setItem('hr_pro_portfolio_v7', JSON.stringify(empData)); alert("✅ บันทึกแล้ว"); }
function setLang(lang) { currentLang = lang; update(); }
function addEmployee() { const name = prompt("ชื่อพนักงาน:"); if(name) { empData[name] = { level: "New", dept: "PQC", init: name.substring(0,2).toUpperCase(), skills: {}, att: {} }; renderList(); } }

window.onload = init;
</script>
</body>
</html>
