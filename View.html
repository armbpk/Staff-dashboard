<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Analytics - Skills Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #020617; --bg-card: #0f172a; --accent-blue: #38bdf8;
            --accent-green: #4ade80; --accent-rose: #fb7185; --accent-warn: #fbbf24;
            --accent-purple: #a855f7;
            --text-primary: #f8fafc; --text-secondary: #94a3b8; --border: #1e293b;
        }
        * { box-sizing: border-box; font-family: 'Inter', 'Sarabun', 'Microsoft YaHei', sans-serif; }
        
        body { 
            margin: 0; 
            background-color: var(--bg-body); 
            color: var(--text-primary); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        .sidebar { 
            width: 320px; 
            background: #020617; 
            border-right: 1px solid var(--border); 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            height: 100%;
        }

        .main-content { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            height: 100%;
        }

        /* --- จุดที่เพิ่ม: ทำให้ดูในมือถือได้ (Responsive) --- */
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .main-content { height: auto; overflow: visible; padding: 10px; }
            .top-row { grid-template-columns: 1fr !important; min-height: auto; }
            .top-row .card { height: 350px; }
            div[style*="grid-template-columns: 1.2fr 1.8fr"] { grid-template-columns: 1fr !important; }
            .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        }

        .lang-bar { display: flex; gap: 5px; margin-bottom: 10px; }
        .lang-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .lang-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); }
        
        .emp-list-container { flex: 1; overflow-y: auto; margin: 15px 0; padding-right: 5px; }
        .emp-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; position: relative; }
        .emp-item.active { border-color: var(--accent-blue); background: rgba(56, 189, 248, 0.1); }
        
        .top-row { 
            display: grid; 
            grid-template-columns: 1fr 1.5fr 1.5fr; 
            gap: 15px; 
            min-height: 320px; 
        }

        .card { 
            background: var(--bg-card); 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            padding: 15px; 
            position: relative; 
            display: flex;
            flex-direction: column;
        }

        .profile-circle { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--accent-blue); overflow: hidden; margin: 0 auto 5px; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
        
        .table-container { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); font-size: 12px; }
        
        .input-num { width: 50px; background: #020617; border: 1px solid var(--border); color: white; padding: 4px; border-radius: 5px; text-align: center; }
        .btn { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: rgba(56, 189, 248, 0.1); color: var(--accent-blue); border: 1px dashed var(--accent-blue); width: 100%; margin-bottom: 10px; }
        .btn-save { background: var(--accent-green); color: #020617; width: 100%; margin-top: auto; }
        
        canvas { max-height: 250px !important; width: 100% !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <div id="side-title" style="font-size: 1.2rem; font-weight: 800; color: #FFFFFF; margin-bottom: 15px;">PQC SKILLS VIEW</div>
    <div class="emp-list-container" id="empList"></div>
    <button class="btn btn-save" onclick="saveData()">💾 บันทึกข้อมูล</button>
</div>

<div class="main-content">
    <div class="top-row">
        <div class="card" style="text-align: center;">
            <div id="profileDisplays" style="display:flex; justify-content:center; gap:10px; flex-wrap: wrap; flex: 1; align-items: center;">
                <p style="color: #FFFFFF;">เลือกพนักงาน</p>
            </div>
            <h4 id="lbl-compare" style="margin-top: 10px; font-size: 14px; color: #FFFFFF;">เปรียบเทียบพนักงาน</h4>
        </div>
        <div class="card"><canvas id="radarChart"></canvas></div>
        <div class="card"><canvas id="barChart"></canvas></div>
    </div>

    <div class="card">
        <h4 style="color: #FFFFFF;">📊 Skill Matrix</h4>
        <div class="table-container" id="tableArea"></div>
    </div>
</div>

<script>
    // ส่วนจำลองข้อมูลพนักงาน (ใช้ข้อมูลเดิมของคุณ)
    let empData = { /* ข้อมูลเดิมของคุณ */ };
    let selected = [];

    // --- จุดที่แก้: ทำให้ตัวหนังสือในกราฟเป็นสีขาว ---
    function initCharts() {
        const textColor = '#FFFFFF';
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: textColor } }
            }
        };

        radarChart = new Chart(document.getElementById("radarChart"), {
            type: 'radar',
            data: { labels: ["Knowledge", "Skill", "System", "Analysis", "Control", "Comm", "Advanced"], datasets: [] },
            options: {
                ...commonOptions,
                scales: {
                    r: {
                        grid: { color: '#1e293b' },
                        pointLabels: { color: textColor, font: { size: 12 } },
                        ticks: { display: false }
                    }
                }
            }
        });

        barChart = new Chart(document.getElementById("barChart"), {
            type: 'bar',
            data: { labels: ["Knowledge", "Skill", "System", "Analysis", "Control", "Comm", "Advanced"], datasets: [] },
            options: {
                ...commonOptions,
                indexAxis: 'y',
                scales: {
                    x: { ticks: { color: textColor }, grid: { color: '#1e293b' } },
                    y: { ticks: { color: textColor } }
                }
            }
        });
    }

    // ฟังก์ชันการทำงานอื่นๆ ของคุณคงเดิมทั้งหมด
    window.onload = () => {
        initCharts();
        // เรียก render ต่างๆ ตามโค้ดเดิมของคุณ
    };
</script>
</body>
</html>
